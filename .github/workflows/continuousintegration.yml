name: Continuous Integration - Workflow
run-name: ${{ github.actor }} is testing out GitHub Actions

on:
  pull_request:
    branches:
      - main

jobs:          
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Python Lint Code Scanning Action
        uses: advanced-security/python-lint-code-scanning-action@v1.1.3
        with:
          linter: pylint

  testes:    
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: pytest test -v --junitxml=junittest-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: junittest-results.xml

  discord:   
    runs-on: ubuntu-latest
    needs: testes
    if: always()
    steps:
      - name: Discord Notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ needs.testes.result }}
          title: "CI - DevOps_PUCPR"
          description: "PR de ${{ github.actor }} | ${{ github.head_ref }} → main"
          color: 0x0075ff